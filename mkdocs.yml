site_name: AI Data Platform Study
site_description: AI Data Platform & Local LLM Study
theme:
  name: material

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.prune
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.highlight 
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md

  - Roadmap: roadmap/study-roadmap.md

  - 시작하기:
      - GitHub 참여 및 소스받기:
          setting/github_team_repository_practice_guide_revised.md
      - SourceTree 사용법:
          setting/sourcetree_github_usage_guide.md
  - 개발환경:
      - Mac Mini AI LAB 구축:
          setting/macmini_ai_lab_guide.md
  - 문서관리:
      - MkDocs 구축:
          setting/mkdocs_github_pages_guide.md
      - MkDocs 구축(Windows):
          setting/mkdocs_github_pages_guide_windows.md
      - MkDocs 배포:
          setting/mkdocs_github_pages_guide_deploy.md

  - AI Lab:

      - Step 1 Local LLM 구축:
          - 개념 이해:
              - Local LLM 구축 가이드: study/step1/step1_local_llm_setup_guide.md
              - LLM 모델 크기 이해: study/step1/local_llm_model_size_guide.md
              - LLM 모델 크기 완전 이해: study/step1/local_llm_model_size_guide_detail.md
          - 구축 실습:
              - Python 가상환경과 Ollama 연동: study/step1/Step1-3_Python_Virtual_Environment_and_Ollama_Guide.md
              - Open WebUI 구축 및 Docker 이해: study/step1/Step1-4_Open_WebUI_Docker_Guide.md
              - Prompt 실습: study/step1/Step1-5_Prompt_Practice_Guide.md

      - Step 2 RAG 구축:
          - 개념 이해:
              - RAG 개요 및 아키텍처 이해: study/step2/step2_rag_overview_guide.md
              - 임베딩 모델 이해: study/step2/step2_2_sentence_transformer_embedding_guide.md
          - 기본 구축:
              - Vector DB 구축 및 문서 적재: study/step2/step2_2_vector_db_build_and_document_ingestion_guide.md
              - RAG 질의응답 구현: study/step2/step2_3_first_rag_difference_guide.md
              - Open WebUI 연동: study/step2/step2_4_open_webui_rag_integration_guide.md
          - 실전 사내 문서 RAG:
              - 개요 및 아키텍처: study/step2/step2_5_enterprise_document_rag_guide_summary.md
              - 문서 전처리 파이프라인: study/step2/step2_5a_enterprise_ingestion_guide.md
              - 실습파일 사용 가이드: study/step2/step2_5a_practice_guide.md
              - Open WebUI Knowledge 구축: study/step2/step2_5b_openwebui_enterprise_knowledge_guide.md
      - Step 3 Agent 만들기 :
          - Agent 개요: study/iceberg.md
      - Step 4 AI Data Platform:
          - AI Data Platform 개요: study/delta-lake.md
      - Step 5 AI Serving Platform:
          - AI Serving Platform 개요: study/delta-lake.md

