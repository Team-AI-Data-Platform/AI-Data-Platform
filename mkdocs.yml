      - MkDocs 문서 Deploy 가이드: setting/mkdocs_github_pages_guide_deploy.md
      - Mac Mini 기반 AI LAB 구축 가이드: setting/macmini_ai_lab_guide.md



  - Study:
      - Step1 local LLM : 
        - Local LLM 구축 가이드: study/step1/step1_local_llm_setup_guide.md
        - LLM 모델 크기 이해: study/step1/local_llm_model_size_guide.md
        - LLM 모델 크기 완전 이해 가이드: study/step1/local_llm_model_size_guide_detail.md
        - Python 가상환경과 Ollama 연동 가이드: study/step1/Step1-3_Python_Virtual_Environment_and_Ollama_Guide.md
        - Open WebUI 구축 및 Docker 이해 가이드: study/step1/Step1-4_Open_WebUI_Docker_Guide.md
