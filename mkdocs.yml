        - Step2-2. Vector DB 구축 및 문서 적재: study/step2/step2_2_vector_db_build_and_document_ingestion_guide.md
        - Step2-3. RAG 질의응답 구현: study/step2/step2_3_first_rag_difference_guide.md
        - Step2-4. Open WebUI 연동: study/step2/step2_4_open_webui_rag_integration_guide.md
        - Step2-5. 실전 사내 문서 RAG 구축: study/step2/step2_5_enterprise_document_rag_guide.md
