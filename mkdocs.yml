site_name: AI Data Platform Study
site_description: AI Data Platform & Local LLM Study
theme:
  name: material
  language: ko

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
